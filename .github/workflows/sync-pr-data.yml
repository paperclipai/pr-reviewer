name: Sync PR Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read

concurrency:
  group: pr-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DB_BACKEND: d1
      D1_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
      D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.PAPERCLIP_SYNC_GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required configuration
        run: |
          missing=0
          for name in DB_BACKEND D1_ACCOUNT_ID D1_DATABASE_ID D1_API_TOKEN GITHUB_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing configuration::$name is not set"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Sync pull requests
        run: node dist/cli.js sync
